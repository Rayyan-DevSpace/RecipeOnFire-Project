<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logging in... — RecipesOnFire</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--gray-light); }
        .login-card {
            text-align:center; padding:48px 36px;
            background:white; border-radius:16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="font-size:3rem; margin-bottom:12px;">🔥</div>
        <h4 class="fw-bold" style="color:var(--orange);">Welcome back!</h4>
        <p class="text-muted">Logging you in...</p>
        <div class="spinner-border mt-2" style="color:var(--orange);" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <script>
        // Set localStorage from URL params (sent by login.php after successful PHP login)
        var params   = new URLSearchParams(window.location.search);
        var user     = params.get("user");
        var email    = params.get("email");

        if (user)  localStorage.setItem("rof_user",  user);
        if (email) localStorage.setItem("rof_email", email);

        // Redirect to homepage
        setTimeout(function() {
            window.location.href = "index.html";
        }, 800);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — RecipesOnFire</title>
    <meta name="description" content="Log in to RecipesOnFire to save your favourite recipes.">
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Minimal Navbar -->
    <nav class="navbar navbar-dark bg-dark px-4 fixed-top shadow-sm">
        <a class="navbar-brand fw-bold" href="index.html">
            Recipes<span class="brand-fire">OnFire</span> 
        </a>
        <div class="d-flex gap-2">
            <a href="index.html"  class="btn-nav-login nav-link">Home</a>
            <a href="signup.html" class="btn-nav-signup">Sign Up</a>
        </div>
    </nav>

    <!-- ========== LOGIN SECTION ========== -->
    <section class="auth-section">
        <div class="auth-card">
            <!-- Logo -->
            <div class="text-center mb-4">
                <div class="auth-logo">Recipes<span>OnFire</span> </div>
                <h2 class="mt-3 mb-1">Welcome Back!</h2>
                <p class="text-muted" style="font-size:0.9rem;">Log in to access your saved recipes.</p>
            </div>

            <!-- Alert area -->
            <div id="alertArea"></div>

            <!-- Login Form -->
            <form id="loginForm" action="php/login.php" method="POST" novalidate>
                <div class="mb-3">
                    <label for="loginEmail" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-envelope" style="color:var(--orange);"></i></span>
                        <input type="email" class="form-control" id="loginEmail" name="email"
                               placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="loginPassword" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-lock" style="color:var(--orange);"></i></span>
                        <input type="password" class="form-control" id="loginPassword" name="password"
                               placeholder="Enter your password" required>
                        <button type="button" class="input-group-text bg-transparent border-start-0"
                                id="togglePwd" title="Show/hide password" style="cursor:pointer;">
                            <i class="bi bi-eye" id="togglePwdIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe" style="font-size:0.85rem;">Remember me</label>
                    </div>
                    <a href="#" style="font-size:0.85rem; color:var(--orange);">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-orange" id="loginSubmitBtn">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Log In
                </button>
            </form>

            <hr class="my-4">

            <p class="text-center text-muted mb-0" style="font-size:0.9rem;">
                Don't have an account?
                <a href="signup.html" style="color:var(--orange); font-weight:600;">Sign Up Free</a>
            </p>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ---- Show/hide password toggle ----
        var togglePwd = document.getElementById("togglePwd");
        var pwdInput  = document.getElementById("loginPassword");
        var pwdIcon   = document.getElementById("togglePwdIcon");

        togglePwd.addEventListener("click", function() {
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
                pwdIcon.className = "bi bi-eye-slash";
            } else {
                pwdInput.type = "password";
                pwdIcon.className = "bi bi-eye";
            }
        });

        // ---- Client-side validation before submitting to PHP ----
        var loginForm = document.getElementById("loginForm");
        loginForm.addEventListener("submit", function(e) {
            var alertArea = document.getElementById("alertArea");
            var email     = document.getElementById("loginEmail").value.trim();
            var password  = document.getElementById("loginPassword").value.trim();
            var emailReg  = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            alertArea.innerHTML = "";

            if (!email || !password) {
                e.preventDefault();
                alertArea.innerHTML = '<div class="alert alert-warning py-2"><i class="bi bi-exclamation-circle me-2"></i>Please fill in all fields.</div>';
                return;
            }

            if (!emailReg.test(email)) {
                e.preventDefault();
                alertArea.innerHTML = '<div class="alert alert-warning py-2"><i class="bi bi-exclamation-circle me-2"></i>Please enter a valid email address.</div>';
                return;
            }

            // Show loading state
            var btn = document.getElementById("loginSubmitBtn");
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
            btn.disabled = true;
        });

        // ---- Show PHP error/success messages (via URL param) ----
        var urlParams     = new URLSearchParams(window.location.search);
        var errorMsg      = urlParams.get("error");
        var successMsg    = urlParams.get("success");
        var alertArea     = document.getElementById("alertArea");

        if (errorMsg) {
            alertArea.innerHTML = '<div class="alert alert-danger py-2"><i class="bi bi-x-circle me-2"></i>' + decodeURIComponent(errorMsg) + '</div>';
        }
        if (successMsg) {
            alertArea.innerHTML = '<div class="alert alert-success py-2"><i class="bi bi-check-circle me-2"></i>' + decodeURIComponent(successMsg) + '</div>';
        }

        // If already logged in, redirect
        if (localStorage.getItem("rof_user")) {
            window.location.href = "index.html";
        }
    </script>

</body>
</html>

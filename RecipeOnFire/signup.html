<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — RecipesOnFire</title>
    <meta name="description" content="Create a free RecipesOnFire account to save your favourite recipes.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Minimal Navbar -->
    <nav class="navbar navbar-dark bg-dark px-4 fixed-top shadow-sm">
        <a class="navbar-brand fw-bold" href="index.html">
            Recipes<span class="brand-fire">OnFire</span> 
        </a>
        <div class="d-flex gap-2">
            <a href="index.html" class="btn-nav-login nav-link">Home</a>
            <a href="login.html" class="btn-nav-signup">Log In</a>
        </div>
    </nav>

    <!-- ========== SIGNUP SECTION ========== -->
    <section class="auth-section">
        <div class="auth-card">
            <div class="text-center mb-4">
                <div class="auth-logo">Recipes<span>OnFire</span> </div>
                <h2 class="mt-3 mb-1">Create Account</h2>
                <p class="text-muted" style="font-size:0.9rem;">It's free! Save recipes you love.</p>
            </div>

            <!-- Alert area -->
            <div id="alertArea"></div>

            <!-- Signup Form -->
            <form id="signupForm" action="php/signup.php" method="POST" novalidate>

                <div class="mb-3">
                    <label for="signupUsername" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent">
                            <i class="bi bi-person" style="color:var(--orange);"></i>
                        </span>
                        <input type="text" class="form-control" id="signupUsername" name="username"
                               placeholder="e.g. chef_rayyan" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="signupEmail" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent">
                            <i class="bi bi-envelope" style="color:var(--orange);"></i>
                        </span>
                        <input type="email" class="form-control" id="signupEmail" name="email"
                               placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="signupPassword" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent">
                            <i class="bi bi-lock" style="color:var(--orange);"></i>
                        </span>
                        <input type="password" class="form-control" id="signupPassword" name="password"
                               placeholder="Min. 6 characters" required>
                        <button type="button" class="input-group-text bg-transparent border-start-0"
                                id="togglePwd" style="cursor:pointer;">
                            <i class="bi bi-eye" id="togglePwdIcon"></i>
                        </button>
                    </div>
                    <!-- Password strength indicator -->
                    <div class="mt-2" id="passwordStrengthBar" style="display:none;">
                        <div class="progress" style="height:4px;">
                            <div class="progress-bar" id="strengthBar" role="progressbar" style="width:0%;"></div>
                        </div>
                        <small id="strengthText" class="text-muted"></small>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="signupConfirm" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent">
                            <i class="bi bi-lock-fill" style="color:var(--orange);"></i>
                        </span>
                        <input type="password" class="form-control" id="signupConfirm" name="confirm_password"
                               placeholder="Repeat your password" required>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                        <label class="form-check-label" for="agreeTerms" style="font-size:0.85rem;">
                            I agree to the <a href="#" style="color:var(--orange);">Terms of Service</a>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-orange" id="signupSubmitBtn">
                    <i class="bi bi-person-plus me-2"></i>Create Free Account
                </button>
            </form>

            <hr class="my-4">

            <p class="text-center text-muted mb-0" style="font-size:0.9rem;">
                Already have an account?
                <a href="login.html" style="color:var(--orange); font-weight:600;">Log In</a>
            </p>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Show/hide password
        var togglePwd = document.getElementById("togglePwd");
        var pwdInput  = document.getElementById("signupPassword");
        var pwdIcon   = document.getElementById("togglePwdIcon");

        togglePwd.addEventListener("click", function() {
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
                pwdIcon.className = "bi bi-eye-slash";
            } else {
                pwdInput.type = "password";
                pwdIcon.className = "bi bi-eye";
            }
        });

        // Password strength indicator
        pwdInput.addEventListener("input", function() {
            var val = pwdInput.value;
            var bar  = document.getElementById("strengthBar");
            var text = document.getElementById("strengthText");
            var wrap = document.getElementById("passwordStrengthBar");

            if (!val) { wrap.style.display = "none"; return; }
            wrap.style.display = "block";

            var strength = 0;
            if (val.length >= 6)  strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            var colors = ["#dc3545", "#dc3545", "#ffc107", "#28a745", "#28a745"];
            var labels = ["Very Weak", "Weak", "Fair", "Strong", "Very Strong"];
            bar.style.width   = (strength * 20) + "%";
            bar.style.backgroundColor = colors[strength - 1] || "#dee2e6";
            text.textContent  = labels[strength - 1] || "";
        });

        // Form validation
        var signupForm = document.getElementById("signupForm");
        signupForm.addEventListener("submit", function(e) {
            var alertArea = document.getElementById("alertArea");
            alertArea.innerHTML = "";

            var username = document.getElementById("signupUsername").value.trim();
            var email    = document.getElementById("signupEmail").value.trim();
            var password = document.getElementById("signupPassword").value;
            var confirm  = document.getElementById("signupConfirm").value;
            var agreed   = document.getElementById("agreeTerms").checked;
            var emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!username || !email || !password || !confirm) {
                e.preventDefault();
                alertArea.innerHTML = '<div class="alert alert-warning py-2"><i class="bi bi-exclamation-circle me-2"></i>Please fill in all fields.</div>';
                return;
            }
            if (!emailReg.test(email)) {
                e.preventDefault();
                alertArea.innerHTML = '<div class="alert alert-warning py-2"><i class="bi bi-exclamation-circle me-2"></i>Please enter a valid email address.</div>';
                return;
            }
            if (password.length < 6) {
                e.preventDefault();
                alertArea.innerHTML = '<div class="alert alert-warning py-2"><i class="bi bi-exclamation-circle me-2"></i>Password must be at least 6 characters.</div>';
                return;
            }
            if (password !== confirm) {
                e.preventDefault();
                alertArea.innerHTML = '<div class="alert alert-danger py-2"><i class="bi bi-x-circle me-2"></i>Passwords do not match.</div>';
                return;
            }
            if (!agreed) {
                e.preventDefault();
                alertArea.innerHTML = '<div class="alert alert-warning py-2"><i class="bi bi-exclamation-circle me-2"></i>Please agree to the Terms of Service.</div>';
                return;
            }

            var btn = document.getElementById("signupSubmitBtn");
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';
            btn.disabled = true;
        });

        // Show URL errors
        var urlParams  = new URLSearchParams(window.location.search);
        var errorMsg   = urlParams.get("error");
        var successMsg = urlParams.get("success");
        var alertArea  = document.getElementById("alertArea");

        if (errorMsg)   alertArea.innerHTML = '<div class="alert alert-danger py-2"><i class="bi bi-x-circle me-2"></i>'   + decodeURIComponent(errorMsg)   + '</div>';
        if (successMsg) alertArea.innerHTML = '<div class="alert alert-success py-2"><i class="bi bi-check-circle me-2"></i>' + decodeURIComponent(successMsg) + '</div>';

        // Already logged in? Redirect
        if (localStorage.getItem("rof_user")) window.location.href = "index.html";
    </script>

</body>
</html>

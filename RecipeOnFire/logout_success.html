<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logging out... — RecipesOnFire</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--gray-light); }
        .logout-card {
            text-align:center; padding:48px 36px;
            background:white; border-radius:16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="logout-card">
        <div style="font-size:3rem; margin-bottom:12px;">👋</div>
        <h4 class="fw-bold">See you later!</h4>
        <p class="text-muted">You have been logged out. Redirecting...</p>
    </div>

    <script>
        // Clear all auth-related localStorage keys
        localStorage.removeItem("rof_user");
        localStorage.removeItem("rof_email");
        localStorage.removeItem("rof_favourites");

        setTimeout(function() {
            window.location.href = "index.html";
        }, 1200);
    </script>
</body>
</html>
